# =============================================================================
# Alembic — configuración de PREPARACIÓN (Fase 3).
#
# IMPORTANTE (reglas de seguridad de esta fase):
#   - Alembic NO se ejecuta en el arranque de la app (no hay hook en startup).
#   - NO reemplaza todavía las migraciones artesanales (`ensure_*` en
#     web_comparativas/migrations.py). Conviven.
#   - NO se corre `upgrade`/`downgrade` contra PostgreSQL producción.
#   - La URL de conexión NO se pone aquí: env.py la resuelve desde DATABASE_URL
#     (y si no existe, usa el SQLite local). Así evitamos credenciales en el repo.
#   - Para correr contra una base remota, env.py exige ALEMBIC_ALLOW_REMOTE=1.
#
# Ver alembic/README.md para el procedimiento de adopción controlada.
# =============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url se deja VACÍA a propósito (la resuelve env.py desde DATABASE_URL).
sqlalchemy.url =

# Formato de nombre de archivos de versión: fecha + slug para orden legible.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[post_write_hooks]
# (sin hooks de formateo por ahora)

# --- Logging ---
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
