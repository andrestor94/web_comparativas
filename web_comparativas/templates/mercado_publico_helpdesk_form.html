{% extends "base.html" %}
{% block title %}Nueva Consulta – Mercado Público{% endblock %}

{% block extra_head %}
<style>
    .form-control::placeholder {
        color: #6c757d;
        opacity: 0.6;
    }
</style>
{% endblock %}

{% block content %}

<div class="h-page-header">
  <div>
    <span class="h-page-header__eyebrow">Mercado Público – Mesa de Ayuda</span>
    <h1 class="h-page-header__title">Nueva Consulta</h1>
    <p class="h-page-header__subtitle">Describe tu consulta o problema para que podamos ayudarte.</p>
  </div>
  <div class="h-page-header__actions">
    <a href="/mercado-publico/helpdesk" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i> Volver
    </a>
  </div>
</div>

<div style="max-width:720px;">
<div class="h-panel">
    <form action="/mercado-publico/helpdesk/new" method="POST">
        <div class="mb-3">
            <label class="form-label">Asunto</label>
            <input type="text" name="title" class="form-control" required
                placeholder="Ej. Error al cargar archivo de ventas">
        </div>

        <div class="row g-3 mb-3">
            <div class="col-12 col-md-6">
                <label class="form-label">Categoría</label>
                <select name="category" class="form-select">
                    <option value="consulta">Consulta General</option>
                    <option value="error">Reporte de Error</option>
                    <option value="sugerencia">Sugerencia</option>
                    <option value="acceso">Problema de Acceso</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label">Prioridad</label>
                <select name="priority" class="form-select">
                    <option value="baja">Baja</option>
                    <option value="media" selected>Media</option>
                    <option value="alta">Alta</option>
                </select>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Mensaje inicial</label>
            <textarea name="message" class="form-control" rows="5" required
                placeholder="Describe detalladamente lo que sucede..."></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-send me-2"></i> Enviar Consulta
            </button>
            <a href="/mercado-publico/helpdesk" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
</div>
{% endblock %}
